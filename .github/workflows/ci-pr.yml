name: CI PR
on: pull_request

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        redis-version: [6, 7]

    permissions:
      contents: write
      packages: write # allow GITHUB_TOKEN to publish packages
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Start Redis
        uses: supercharge/redis-github-action@ea9b21c6ecece47bd99595c532e481390ea0f044 # 1.8.0
        with:
          redis-version: ${{ matrix.redis-version }}

      - run: npm install
      - run: npm run check
      - run: npm run test

      - uses: nickcharlton/diff-check@9fa7ac2bd275b9ec60f13dbcef1b90cfaadc1872 # main
        with:
          command: npm run build
          message: "Please make sure to run 'npm run fix && npm run build' before committing."

  automerge:
    needs: test
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@30c3f8f14a4f7b315ba38dbc1b793d27128fef82 # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: 'squash'
          target: 'minor'
          approve-only: false
